# ============================================================
# Bot Detection Experiment Configuration
# ============================================================

# ----------------------------------------------------------
# Data sources
# ----------------------------------------------------------
data_sources:
  oss_parquet: "/home/jeff/Documents/neoteny/code/neoteny/data/oss_data/parquet"
  neoteny_primary: "/home/jeff/Documents/neoteny/code/copy-1/neoteny/data/github/.cache/github_cache.duckdb"
  neoteny_secondary: "/home/jeff/Documents/neoteny/code/neoteny/data/github/.cache/github_cache.duckdb"
  pr27_data: "experiments/validation/data/raw"

# ----------------------------------------------------------
# Outcome classification
# ----------------------------------------------------------
classification:
  stale_threshold_floor_days: 30
  stale_threshold_cap_days: 180
  stale_threshold_percentile: 90
  stale_threshold_bin: "2024H1"

# ----------------------------------------------------------
# H1: Burstiness parameter sweep
# ----------------------------------------------------------
burstiness_sweep:
  windows_hours: [1, 4, 12, 24]
  min_repos: [2, 3, 5]
  min_prs: [3, 5, 10]

# ----------------------------------------------------------
# Analysis
# ----------------------------------------------------------
analysis:
  cv_folds: 5
  random_seed: 42
  alpha: 0.05
  positive_class: "not_merged"

# ----------------------------------------------------------
# Scale definitions (repo subsets for ramp-up)
# ----------------------------------------------------------
scale:
  micro:
    - "keras-team/keras"
    - "pytorch/pytorch"
  small:
    - "keras-team/keras"
    - "pytorch/pytorch"
    - "scikit-learn/scikit-learn"
    - "apache/spark"
    - "apache/kafka"
    - "fastapi/fastapi"
    - "astral-sh/ruff"
    - "golang/go"
    - "microsoft/TypeScript"
    - "pallets/flask"

# ----------------------------------------------------------
# Bot patterns (for filtering known bots)
# ----------------------------------------------------------
bot_patterns:
  - "\\[bot\\]$"
  - "-bot$"
  - "_bot$"
  - "-app$"
  - "^app/"
  - "^dependabot"
  - "^renovate"
  - "^greenkeeper"
  - "^snyk-"
  - "^codecov"
  - "^mergify"
  - "^allcontributors"
  - "^github-actions"
  - "^pre-commit-ci"

# ----------------------------------------------------------
# Embedding (H3b)
# ----------------------------------------------------------
embedding:
  model: "gemini-embedding-001"
  batch_size: 50

# ----------------------------------------------------------
# Author-level analysis (Iteration 5: H8-H13)
# ----------------------------------------------------------
author_analysis:
  # H9: Time series
  burst_gap_days: 7
  burst_min_prs: 3

  # H11: LLM content
  llm_model: "gemini/gemini-2.0-flash"
  llm_max_titles: 50
  llm_pre_filter_merge_rate: 0.5
  llm_pre_filter_min_repos: 2

  # H12: Campaigns
  campaign_windows:
    - name: "hacktoberfest_2020"
      start: "2020-10-01"
      end: "2020-10-31"
    - name: "hacktoberfest_2019"
      start: "2019-10-01"
      end: "2019-10-31"

  # H13: Semi-supervised
  knn_k: 5
  isolation_forest_contamination: 0.05

  # Evaluation
  precision_at_k: [10, 25, 50, 100, 250]
  cv_folds: 5
  random_seed: 42

# ----------------------------------------------------------
# Paths (relative to experiments/bot-detection/)
# ----------------------------------------------------------
paths:
  local_db: "data/bot_detection.duckdb"
  features: "data/features"
  results: "data/results"
